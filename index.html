<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈️ Attent!on Airlines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       TOKENS
    ============================================ */
    :root {
      --sky:        #d3feff;
      --sky-border: #a8f6f8;
      --black:      #2b2b2b;
      --white:      #ffffff;
      --gray:       #888888;
      --green:      #228b22;
      --font-mono:  'Share Tech Mono', monospace;
      --font-disp:  'Orbitron', monospace;
    }

    /* ============================================
       RESET
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-mono);
      background: var(--sky);
      color: var(--black);
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ============================================
       TICKET SHELL — 항공권 느낌
    ============================================ */
    #ticket-shell {
      width: min(390px, 94vw);   /* 양옆 여백 줘서 float 느낌 */
      height: min(820px, 96dvh);
      background: var(--white);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* 티켓 그림자 */
      box-shadow: 0 8px 40px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.10);
      border-radius: 10px;
    }
    /* sky 사이드바 — 바코드 사이 구간만 */
    #ticket-shell::before,
    #ticket-shell::after {
      content: '';
      position: absolute;
      top: 12.5%;
      bottom: 12.5%;
      width: 10%;
      background: var(--sky);
      z-index: 0;
    }
    #ticket-shell::before { left: 0; }
    #ticket-shell::after  { right: 0; }

    /* 바코드↔본문 경계: 양쪽 반원 노치 (미싱 라인 효과) */
    .ticket-notch {
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      height: 0;
    }
    .ticket-notch::before,
    .ticket-notch::after {
      content: '';
      position: absolute;
      top: -10px;
      width: 20px;
      height: 20px;
      background: var(--sky);   /* 배경색으로 파여보이는 효과 */
      border-radius: 50%;
      z-index: 3;
    }
    .ticket-notch::before { left: -10px; }
    .ticket-notch::after  { right: -10px; }

    /* 노치 사이 점선 구분선 */
    .ticket-notch-line {
      position: absolute;
      top: -1px;
      left: 10px;
      right: 10px;
      border-top: 1.5px dashed rgba(0,0,0,0.15);
      z-index: 3;
    }

    /* ============================================
       BARCODE STRIPS
    ============================================ */
    .barcode-strip {
      width: 100%;
      height: 12.5%;
      min-height: 60px;
      background: var(--black);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    /* 상단 바코드: 위 모서리 둥글게 */
    #barcode-top    { border-radius: 10px 10px 0 0; }
    /* 하단 바코드: 아래 모서리 둥글게 */
    #barcode-bottom { border-radius: 0 0 10px 10px; }
    .barcode-lines {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 6px 0;
    }
    .barcode-lines span {
      display: block;
      height: 100%;
      background: var(--white);
      margin-right: 1px;
      flex-shrink: 0;
    }
    .barcode-code {
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 4px;
      text-align: right;
      padding: 2px 8px 4px;
    }

    /* ============================================
       SCREENS
    ============================================ */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .screen.active { display: flex; }

    /* inner content padding (사이드바 안쪽) */
    .ticket-body {
      padding: 0 calc(10% + 10px);
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ============================================
       TICKET HEADER (FLIGHT / GATE / ✈)
    ============================================ */
    .ticket-header {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 14px 0 6px;
      gap: 20px;
    }
    .ticket-header .plane-icon {
      font-size: 2.2rem;
      line-height: 1;
    }
    .fi-pair { display: flex; gap: 20px; }
    .flight-info { text-align: center; }
    .flight-info .fi-label {
      font-family: var(--font-disp);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--black);
    }
    .flight-info .fi-value {
      font-family: var(--font-disp);
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
    }

    /* ============================================
       START SCREEN
    ============================================ */
    #screen-start .ticket-body {
      justify-content: space-between;
      padding-bottom: 20px;
    }
    /* idid 배지 */
    .idid-badge {
      display: inline-block;
      align-self: flex-start;
      background: var(--black);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 7px 18px;
      border-radius: 2px;
    }
    /* FLY! 히어로 — 더 크고 굵게, 하늘색 강조 */
    .fly-hero {
      font-family: var(--font-disp);
      font-size: clamp(4rem, 20vw, 6.4rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 0.9;
      color: var(--black);
      position: relative;
    }
    /* FLY! 뒤 장식 텍스트 */
    .fly-hero::after {
      content: 'FLY!';
      position: absolute;
      left: 3px; top: 3px;
      color: var(--sky-border);
      z-index: -1;
    }

    /* 중앙 히어로 영역 */
    .start-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: center;
      position: relative;
    }
    /* 배경 일러스트 요소들 (SVG) */
    .start-deco {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }
    /* [ BOOK FLIGHT ] 버튼 — sky 배경 강조 */
    .start-bottom { display: flex; flex-direction: column; }
    .btn-book {
      font-family: var(--font-disp);
      font-size: 11px;
      letter-spacing: 4px;
      padding: 18px 0;
      width: 100%;
      cursor: pointer;
      border: 2.5px solid var(--sky-border);
      background: var(--sky);
      color: var(--black);
      text-align: center;
      text-transform: uppercase;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-book:hover, .btn-book:active {
      background: var(--sky-border);
      box-shadow: 0 2px 12px rgba(168,246,248,0.5);
    }


    /* ============================================
       DATE SELECT SCREEN
    ============================================ */
    #screen-date .ticket-body {
      padding-bottom: 12px;
      gap: 8px;
    }
    #screen-date h2 {
      font-family: var(--font-disp);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--black);
      margin-top: 8px;
    }
    #date-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }
    #date-list::-webkit-scrollbar { width: 3px; }
    #date-list::-webkit-scrollbar-thumb { background: var(--sky); }
    .date-group { border: 1px solid #ddd; }
    .date-group-header {
      padding: 7px 10px;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
    }
    .date-group-header:hover { background: var(--sky); }
    .date-group-body { display: flex; flex-direction: column; }
    .memory-option {
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
    }
    .memory-option:hover { background: #f0fbfd; }
    .memory-option.done { color: var(--green); }
    .memory-option .mem-id { color: #aaa; font-size: 0.65rem; min-width: 52px; }
    .memory-option .mem-emojis { font-size: 1.1rem; letter-spacing: 3px; flex: 1; }
    .memory-option .mem-done { font-size: 0.65rem; letter-spacing: 1px; color: var(--green); }

    /* ============================================
       GAME SCREEN
    ============================================ */
    #screen-game {
      flex-direction: column;
      position: relative;
    }
    /* HUD */
    #game-hud {
      padding: 8px calc(10% + 10px) 6px;
      background: linear-gradient(to bottom, var(--sky) 0%, var(--white) 100%);
      border-bottom: 1.5px solid var(--black);
      z-index: 10;
      flex-shrink: 0;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    #hud-target-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--gray);
      font-family: var(--font-mono);
    }
    #hud-progress-text {
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--gray);
      font-family: var(--font-mono);
    }
    #btn-passport {
      font-size: 8px;
      padding: 4px 8px;
      cursor: pointer;
      background: var(--black);
      border: none;
      color: var(--white);
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }
    #btn-passport:hover { background: #444; }
    #hud-target-emojis {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .target-emoji-slot {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      font-size: 1.4rem;
    }
    .target-emoji-slot:not(.collected) { opacity: 0.3; }
    .target-emoji-slot.collected::after {
      content: '✓';
      position: absolute;
      bottom: -2px; right: -2px;
      font-size: 10px;
      color: var(--green);
      background: var(--white);
      width: 12px; height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* game canvas */
    #game-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
      /* 하늘 그라데이션 */
      background: linear-gradient(
        to bottom,
        #e8fbff 0%,
        #f5feff 40%,
        #ffffff 100%
      );
    }
    /* 지평선 라인 */
    #game-canvas::after {
      content: '';
      position: absolute;
      bottom: 100px;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(168,246,248,0.6), transparent);
      pointer-events: none;
      z-index: 2;
    }
    /* cloud */
    .cloud {
      position: absolute;
      opacity: 0.28;
      pointer-events: none;
      animation: cloudDrift linear infinite;
    }
    @keyframes cloudDrift {
      from { transform: translateX(-80px); }
      to   { transform: translateX(calc(100% + 80px)); }
    }
    /* plane — 더 크게 */
    #plane {
      position: absolute;
      bottom: 70px;
      font-size: 2.4rem;
      z-index: 5;
      transition: transform 0.1s;
      filter: drop-shadow(0 2px 6px rgba(168,246,248,0.6));
    }
    #plane.moving-left  { transform: rotate(-10deg); }
    #plane.moving-right { transform: rotate(10deg); }
    /* falling emojis */
    .falling-emoji {
      position: absolute;
      font-size: 1.8rem;
      z-index: 4;
      pointer-events: none;
      will-change: transform;
    }
    /* collect burst */
    .collect-burst {
      position: absolute;
      font-size: 1.2rem;
      z-index: 8;
      pointer-events: none;
      animation: burstUp 0.5s ease-out forwards;
    }
    @keyframes burstUp {
      0%   { opacity: 1; transform: scale(1.4) translateY(0); }
      100% { opacity: 0; transform: scale(0.6) translateY(-40px); }
    }
    /* combo */
    #combo-display {
      position: absolute;
      top: 20px; right: 28px;
      font-family: var(--font-disp);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--black);
      z-index: 9;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #combo-display.visible { opacity: 1; }
    /* oops */
    #oops {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      background: var(--black);
      color: var(--white);
      padding: 8px 18px;
      font-size: 10px;
      letter-spacing: 2px;
      font-family: var(--font-mono);
      z-index: 20;
      display: none;
      white-space: nowrap;
      pointer-events: none;
    }
    /* speed flash */
    #speed-flash {
      position: absolute;
      inset: 0;
      background: rgba(184,240,248,0.25);
      pointer-events: none;
      opacity: 0;
      z-index: 3;
      transition: opacity 0.1s;
    }
    #speed-flash.visible { opacity: 1; }
    /* mobile touch zones */
    #touch-left, #touch-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      z-index: 3;
    }
    #touch-left  { left: 0; }
    #touch-right { right: 0; }

    /* ============================================
       SHARED BUTTONS
    ============================================ */
    .btn {
      font-family: var(--font-disp);
      font-size: 11px;
      letter-spacing: 3px;
      padding: 12px 20px;
      cursor: pointer;
      border: 2px solid var(--sky-border);
      background: transparent;
      color: var(--black);
      border-radius: 0;
      transition: background 0.15s;
      text-transform: uppercase;
    }
    .btn:hover, .btn:active { background: var(--sky); }
    .btn.btn-dark {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }
    .btn.btn-dark:hover { background: #444; }
    .btn.btn-sm {
      font-size: 9px;
      padding: 7px 12px;
      letter-spacing: 2px;
    }

    /* ============================================
       MODAL
    ============================================ */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.active { display: flex; }
    #modal-box {
      background: var(--white);
      width: min(380px, 92vw);
      max-height: 86dvh;
      overflow-y: auto;
      position: relative;
      border-top: 5px solid var(--black);
    }
    #modal-box::before,
    #modal-box::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 14px;
      background: var(--sky);
    }
    #modal-box::before { left: 0; }
    #modal-box::after  { right: 0; }
    #modal-inner { padding: 20px 24px; position: relative; }
    #modal-close {
      position: absolute;
      top: 12px; right: 16px;
      cursor: pointer;
      color: var(--gray);
      font-size: 1rem;
      background: none;
      border: none;
      font-family: var(--font-mono);
    }
    #modal-close:hover { color: var(--black); }
    .modal-title {
      font-family: var(--font-disp);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .modal-date {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--gray);
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }
    .modal-emojis {
      font-size: 2rem;
      letter-spacing: 10px;
      margin: 10px 0;
    }
    /* 이미지 자리 */
    .modal-image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
      margin: 10px 0;
      border: 1px solid #eee;
    }
    .modal-image-placeholder {
      width: 100%;
      height: 100px;
      border: 1px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 2px;
      color: #ccc;
      margin: 10px 0;
      font-family: var(--font-mono);
    }
    .modal-btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    /* Passport list */
    .passport-date-group { margin-bottom: 14px; }
    .passport-date-label {
      font-family: var(--font-disp);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--black);
      margin-bottom: 5px;
      border-bottom: 1px solid #eee;
      padding-bottom: 3px;
    }
    .passport-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .passport-row:hover { background: #f0fbfd; }
    .passport-row.locked { opacity: 0.4; cursor: default; }
    .passport-row .pr-status { font-size: 11px; width: 14px; flex-shrink: 0; }
    .passport-row .pr-emojis { font-size: 1rem; letter-spacing: 3px; flex: 1; }
    .passport-row .pr-id { font-size: 9px; letter-spacing: 1px; color: #aaa; font-family: var(--font-mono); }
    .passport-row .pr-thumb {
      width: 32px; height: 32px;
      object-fit: cover;
      border: 1px solid #eee;
      flex-shrink: 0;
    }

    /* ============================================
       FLIGHT COMPLETE OVERLAY
    ============================================ */
    #overlay-complete {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
    }
    #overlay-complete.active { display: flex; }
    #overlay-complete .c-title {
      font-family: var(--font-disp);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 3px;
    }
    #overlay-complete .c-sub {
      color: var(--sky);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 3px;
    }
    #overlay-complete .c-tag {
      color: #555;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
    }
    #overlay-complete .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
<div id="ticket-shell">

  <!-- BARCODE TOP -->
  <div class="barcode-strip" id="barcode-top">
    <div class="barcode-lines" id="barcode-lines-top"></div>
    <div class="barcode-code">FLY-260527-0621</div>
  </div>
  <!-- 노치 (미싱 라인) -->
  <div class="ticket-notch"><div class="ticket-notch-line"></div></div>

  <!-- ============================================
       SCREEN: START
  ============================================= -->
  <div id="screen-start" class="screen active">
    <div class="ticket-body">
      <!-- 헤더 -->
      <div class="ticket-header">
        <div class="fi-pair">
          <div class="flight-info">
            <div class="fi-label">FLIGHT</div>
            <div class="fi-value">WD915</div>
          </div>
          <div class="flight-info">
            <div class="fi-label">GATE</div>
            <div class="fi-value">7</div>
          </div>
        </div>
        <div class="plane-icon">✈</div>
      </div>

      <!-- 히어로 -->
      <div class="start-hero">
        <!-- 배경 구름 SVG 일러스트 -->
        <svg class="start-deco" style="right:-10px;top:10px;width:110px;opacity:0.13;" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="60" cy="40" rx="50" ry="18" fill="#2b2b2b"/>
          <ellipse cx="45" cy="32" rx="28" ry="16" fill="#2b2b2b"/>
          <ellipse cx="72" cy="28" rx="22" ry="14" fill="#2b2b2b"/>
        </svg>
        <svg class="start-deco" style="left:0px;bottom:30px;width:80px;opacity:0.07;" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="60" cy="40" rx="50" ry="18" fill="#2b2b2b"/>
          <ellipse cx="45" cy="32" rx="28" ry="16" fill="#2b2b2b"/>
          <ellipse cx="72" cy="28" rx="22" ry="14" fill="#2b2b2b"/>
        </svg>
        <!-- 점선 경로 SVG -->
        <svg class="start-deco" style="right:0;bottom:40px;width:90px;opacity:0.15;" viewBox="0 0 100 40">
          <path d="M10 30 Q50 5 90 20" stroke="#2b2b2b" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
          <polygon points="88,14 96,22 84,24" fill="#2b2b2b"/>
        </svg>
        <div class="idid-badge" style="position:relative;z-index:1;">idid</div>
        <div class="fly-hero" style="position:relative;z-index:1;">FLY!</div>
      </div>

      <!-- 버튼 -->
      <div class="start-bottom">

<script>
/* ================================================
   BARCODE 생성
================================================ */
function generateBarcode(linesId) {
  const target = document.getElementById(linesId);
  if (!target) return;
  let html = '';
  for (let i = 0; i < 90; i++) {
    const w = Math.random() < 0.5 ? 1 : (Math.random() < 0.4 ? 2 : 3);
    const bg = i % 2 === 0 ? 'background:#fff;' : '';
    html += `<span style="width:${w}px;${bg}"></span>`;
  }
  target.innerHTML = html;
}

/* ================================================
   DATA — memories 배열
   image: null → 나중에 경로 입력 (예: "images/0528-A.jpg")
================================================ */
const memories = [
  { id:"0528-A", date:"0528", emojis:["✈️", "🩵", "🛄"], link:"https://youtu.be/bafK0I5LwqI?si=Z5hrzwx8PwFBYWGG", image:"/Users/ekdud/Desktop/FLY!/0528-A.png" },

  { id:"0529-A", date:"0529", emojis:["🤍", "💦", "✈️"], link:"https://youtu.be/blNSLBlQ0eo?si=eJdp1x99ScwCZuuu", image:"/Users/ekdud/Desktop/FLY!/0529-A.png" },
  { id:"0529-B", date:"0529", emojis:["🫟", "🪅", "🌃"], link:"https://youtu.be/KSxvjFweTAM?si=Q61bLzvJenAIcYTk", image:"/Users/ekdud/Desktop/FLY!/0529-B.png" },
  { id:"0529-C", date:"0529", emojis:["🌐", "👟", "💙"], link:"https://youtu.be/b7tvlBJmQNQ?si=mEDsaiFZTPBeETXZ", image:"/Users/ekdud/Desktop/FLY!/0529-C.png" },
  { id:"0530-A", date:"0530", emojis:["💙", "☁️", "🚙"], link:"https://youtu.be/z0SI0Se5JEE?si=WlHlyLlyDA_faad0", image:"/Users/ekdud/Desktop/FLY!/0530.png" },
  { id:"0531-A", date:"0531", emojis:["🌟", "🔵", "🚏"], link:"https://youtu.be/mHxlfOh-p1g?si=f2PKNzXMzTQ7O4uV", image:"/Users/ekdud/Desktop/FLY!/0531.png" },
  { id:"0603-A", date:"0603", emojis:["🔵", "👕", "👔"], link:"https://youtu.be/OCqXDgb_uVY?si=MWLmZeTbaclTEaYg", image:"/Users/ekdud/Desktop/FLY!/0603.png" },
  { id:"0604-A", date:"0604", emojis:["🩷", "🖤", "🪽"], link:"https://youtu.be/z16Wm72IxM8?si=XlMp2OvrsE-pN-hF", image:"/Users/ekdud/Desktop/FLY!/0604.png" },
  { id:"0605-A", date:"0605", emojis:["🎤", "🥁", "🛋️"], link:"https://youtu.be/kZrhrCAoDp0?si=ZOOZ9Nkctbi-K7rk", image:"/Users/ekdud/Desktop/FLY!/0605-A.png" },
  { id:"0605-B", date:"0605", emojis:["❤️", "🖤", "💛"], link:"https://youtu.be/llyvVBokjO4?si=_yQMPqtDcwy0jsAz", image:"/Users/ekdud/Desktop/FLY!/0605-B.png" },
  { id:"0605-C", date:"0605", emojis:["⚽️", "🩵", "🇰🇷"], link:"https://youtu.be/cAWSFlw7oQs?si=₀JKkfIs6bxAa1Xoq", image:"/Users/ekdud/Desktop/FLY!/0605-C.png" },
  { id:"0606-A", date:"0606", emojis:["🎒", "💙", "🧶"], link:"https://youtu.be/RXUngoX3MQI?si=RSxPGpovkup0rfMj", image:"/Users/ekdud/Desktop/FLY!/0606.png" },
  { id:"0607-A", date:"0607", emojis:["💚", "🎂", "💙"], link:"https://youtu.be/3cmVdF41VHg?si=Pz1LOk8jSzBD3Wfu", image:"/Users/ekdud/Desktop/FLY!/0607.png" },
  { id:"0608-A", date:"0608", emojis:["✈️", "🧑‍✈️", "💺"], link:"https://youtu.be/BbvK0skWK4Q?si=v_B8MvrXpD_Cr5X0", image:"/Users/ekdud/Desktop/FLY!/0608.png" },
  { id:"0610-A", date:"0610", emojis:["❤️", "🌟", "👀"], link:"https://youtu.be/UuM7w0jJDP8?si=Ad90ANvR4iyAC24W", image:"/Users/ekdud/Desktop/FLY!/0610.png" },
  { id:"0611-A", date:"0611", emojis:["🖤", "🐭", "⚫️"], link:"https://youtu.be/NEk-bp8UvGQ?si=r5aPfI-C5nSjjDhk", image:"/Users/ekdud/Desktop/FLY!/0611.png" },
  { id:"0612-A", date:"0612", emojis:["👔", "👖", "🩵"], link:"https://youtu.be/Fz7J6wYmI4c?si=bQR14xcW5oObiMTD", image:"/Users/ekdud/Desktop/FLY!/0612.png" },
  { id:"0613-A", date:"0613", emojis:["💚", "🩷", "💙"], link:"https://youtu.be/dJQ5y6FTVeQ?si=4yWBM6cvrdv67Ij-", image:"/Users/ekdud/Desktop/FLY!/0613.png" },
  { id:"0614-A", date:"0614", emojis:["🤍", "🎶", "🎵"], link:"https://youtu.be/PVSBZHEqdds?si=rZW6mMZgpRYJZ_Nq", image:"/Users/ekdud/Desktop/FLY!/0614.png" },
  { id:"0618-A", date:"0618", emojis:["🩷", "🎶", "👚"], link:"https://youtu.be/CrkJm0Ejra0?si=zdyWny23s-qe_dsU", image:"/Users/ekdud/Desktop/FLY!/0618.png" },
  { id:"0620-A", date:"0620", emojis:["💙", "👟", "🩵"], link:"https://youtu.be/E1d16W7YegA?si=wo3SMbJ86YlLs5XY", image:"/Users/ekdud/Desktop/FLY!/0620.png" },
  { id:"0621-A", date:"0621", emojis:["🏫", "🎒", "🤍"], link:"https://youtu.be/DKg641FCqRU?si=4XV-PpXwnVwPiqho", image:"/Users/ekdud/Desktop/FLY!/0621.jpeg" },
];

const emojiPool = [
  "✈️","🩵","🛄","🎸","🥁","🤍","💦","🌐","👟","💙",
  "🫟","🪅","🌃","☁️","🚙","🌟","🔵","🚏","👕","👔",
  "🩷","🖤","🪽","🎤","🛋️","❤️","💛","⚽️","🇰🇷","🎒",
  "🧶","💚","🎂","🧑‍✈️","💺","👀","🐭","⚫️","👖","🎵",
  "🎶","👚","🏫","🌸","⭐","🎉","🎀","🪻","🌈","🎵"
];

/* ================================================
   GAME STATE
================================================ */
let state = {
  completedIds: new Set(),
  currentMemory: null,
  collected: [],
  planeX: 0,
  keysDown: {},
  spawnInterval: null,
  gameLoopId: null,
  fallingEmojis: [],
  touchLeft: false,
  touchRight: false,
  oopsTimeout: null,
  combo: 0,
  comboTimeout: null,
  difficultyLevel: 1,
  difficultyTimer: null,
  spawnDelay: 1000,
};

/* ================================================
   UTILS
================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function groupByDate(arr) {
  const map = {};
  arr.forEach(m => {
    if (!map[m.date]) map[m.date] = [];
    map[m.date].push(m);
  });
  return map;
}

/* ================================================
   BOOT
================================================ */
function boot() {
  generateBarcode('barcode-lines-top');
  generateBarcode('barcode-lines-bottom');

  // 터치
  document.getElementById('touch-left').addEventListener('touchstart', e => { e.preventDefault(); state.touchLeft = true; }, { passive:false });
  document.getElementById('touch-left').addEventListener('touchend', () => { state.touchLeft = false; });
  document.getElementById('touch-right').addEventListener('touchstart', e => { e.preventDefault(); state.touchRight = true; }, { passive:false });
  document.getElementById('touch-right').addEventListener('touchend', () => { state.touchRight = false; });

  // 키보드 — game 화면 active일 때만 처리
  document.addEventListener('keydown', e => {
    const gameActive = document.getElementById('screen-game').classList.contains('active');
    if (!gameActive) return;
    state.keysDown[e.key] = true;
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', e => { state.keysDown[e.key] = false; });
}
boot();

/* ================================================
   DATE SELECT
================================================ */
function showDateSelect() {
  showScreen('screen-date');
  renderDateList();
}

function renderDateList() {
  const container = document.getElementById('date-list');
  container.innerHTML = '';
  const grouped = groupByDate(memories);

  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-size:9px;letter-spacing:2px;color:#888;margin-bottom:4px;font-family:var(--font-mono);';
  hdr.textContent = `COMPLETED: ${state.completedIds.size} / ${memories.length}`;
  container.appendChild(hdr);

  Object.keys(grouped).sort().forEach(date => {
    const grp = grouped[date];
    const doneCount = grp.filter(m => state.completedIds.has(m.id)).length;
    const group = document.createElement('div');
    group.className = 'date-group';

    const h = document.createElement('div');
    h.className = 'date-group-header';
    h.innerHTML = `📅 ${date} <span style="margin-left:auto;font-size:9px;color:#aaa;">${doneCount}/${grp.length}</span>`;
    group.appendChild(h);

    const body = document.createElement('div');
    body.className = 'date-group-body';
    grp.forEach(mem => {
      const done = state.completedIds.has(mem.id);
      const row = document.createElement('div');
      row.className = 'memory-option' + (done ? ' done' : '');
      row.innerHTML = `
        <span class="mem-id">${mem.id}</span>
        <span class="mem-emojis">${mem.emojis.join(' ')}</span>
        ${done ? '<span class="mem-done">✓ DONE</span>' : ''}
      `;
      row.addEventListener('click', () => selectMemory(mem));
      body.appendChild(row);
    });
    group.appendChild(body);
    container.appendChild(group);
  });
}

/* ================================================
   SELECT MEMORY → GAME
================================================ */
function selectMemory(mem) {
  state.currentMemory = mem;
  state.collected = [];
  state.fallingEmojis = [];
  state.keysDown = {};
  state.combo = 0;
  state.difficultyLevel = 1;
  state.spawnDelay = 1000;
  showScreen('screen-game');
  initGame();
}

/* ================================================
   initGame
================================================ */
function initGame() {
  const mem = state.currentMemory;
  updateTargetHUD();
  updateProgressText();

  const canvas = document.getElementById('game-canvas');
  state.planeX = canvas.offsetWidth / 2 - 20;
  document.getElementById('plane').style.left = state.planeX + 'px';

  document.querySelectorAll('.falling-emoji').forEach(e => e.remove());
  document.querySelectorAll('.collect-burst').forEach(e => e.remove());
  document.querySelectorAll('.cloud').forEach(e => e.remove());
  state.fallingEmojis = [];

  clearInterval(state.spawnInterval);
  cancelAnimationFrame(state.gameLoopId);
  clearInterval(state.difficultyTimer);

  spawnClouds();
  state.spawnInterval = setInterval(spawnEmoji, state.spawnDelay);
  state.difficultyTimer = setInterval(increaseDifficulty, 15000);
  gameLoop();
}

/* ================================================
   구름 장식
================================================ */
function spawnClouds() {
  const canvas = document.getElementById('game-canvas');
  const w = canvas.offsetWidth;
  const cl = ['☁️','⛅','🌤'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'cloud';
    el.textContent = cl[Math.floor(Math.random() * cl.length)];
    const dur = 18 + Math.random() * 20;
    const startX = -60 + Math.random() * w * 0.3;
    el.style.cssText = `left:${startX}px;top:${10+Math.random()*75}%;font-size:${1.2+Math.random()*1.2}rem;animation-duration:${dur}s;animation-delay:-${Math.random()*dur}s;`;
    canvas.appendChild(el);
  }
}

/* ================================================
   난이도 상승
================================================ */
function increaseDifficulty() {
  if (state.difficultyLevel >= 5) return;
  state.difficultyLevel++;
  state.spawnDelay = Math.max(380, state.spawnDelay - 120);
  clearInterval(state.spawnInterval);
  state.spawnInterval = setInterval(spawnEmoji, state.spawnDelay);
  const flash = document.getElementById('speed-flash');
  flash.classList.add('visible');
  setTimeout(() => flash.classList.remove('visible'), 400);
}

/* ================================================
   spawnEmoji — 한 번에 여러 개
================================================ */
function spawnEmoji() {
  const count = 2 + Math.floor(state.difficultyLevel * 0.6);
  for (let i = 0; i < count; i++) _spawnSingle();
}

function _spawnSingle() {
  const canvas = document.getElementById('game-canvas');
  const w = canvas.offsetWidth;
  const mem = state.currentMemory;

  // 정답 확률: 레벨1=20%, 레벨5=8%
  const targetChance = Math.max(0.08, 0.20 - state.difficultyLevel * 0.03);
  const uncollected = mem.emojis.filter(e => !state.collected.includes(e));

  let emoji;
  if (uncollected.length > 0 && Math.random() < targetChance) {
    emoji = uncollected[Math.floor(Math.random() * uncollected.length)];
  } else {
    emoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
  }

  const el = document.createElement('div');
  el.className = 'falling-emoji';
  el.textContent = emoji;
  const x = 10 + Math.random() * (w - 50);
  const startY = -30 - Math.random() * 60;
  el.style.left = x + 'px';
  el.style.top = startY + 'px';
  canvas.appendChild(el);

  const baseSpeed = 1.8 + state.difficultyLevel * 0.4;
  state.fallingEmojis.push({
    el, x, y: startY, emoji,
    speed: baseSpeed + Math.random() * 1.0,
    wobble: Math.random() * Math.PI * 2,
    wobbleAmp: state.difficultyLevel > 2 ? 1.2 : 0
  });
}

/* ================================================
   movePlane
================================================ */
function movePlane() {
  const canvas = document.getElementById('game-canvas');
  const w = canvas.offsetWidth;
  const speed = 7 + state.difficultyLevel * 0.5;
  const plane = document.getElementById('plane');

  const goLeft  = state.keysDown['ArrowLeft']  || state.keysDown['a'] || state.keysDown['A'] || state.touchLeft;
  const goRight = state.keysDown['ArrowRight'] || state.keysDown['d'] || state.keysDown['D'] || state.touchRight;

  if (goLeft)  state.planeX = Math.max(0, state.planeX - speed);
  if (goRight) state.planeX = Math.min(w - 44, state.planeX + speed);

  plane.style.left = state.planeX + 'px';
  plane.classList.toggle('moving-left',  goLeft  && !goRight);
  plane.classList.toggle('moving-right', goRight && !goLeft);
}

/* ================================================
   collectEmoji
================================================ */
function collectEmoji() {
  const canvas = document.getElementById('game-canvas');
  const h = canvas.offsetHeight;
  const pL = state.planeX;
  const pR = state.planeX + 44;
  const pT = h - 70 - 10;
  const pB = h - 70 + 34;
  const toRemove = [];

  state.fallingEmojis.forEach(obj => {
    if (obj.y > h + 30) { toRemove.push(obj); return; }
    if (pL < obj.x + 34 && pR > obj.x - 2 && pT < obj.y + 32 && pB > obj.y) {
      toRemove.push(obj);
      handleCollect(obj.emoji, obj.x, obj.y);
    }
  });
  toRemove.forEach(obj => {
    obj.el.remove();
    state.fallingEmojis = state.fallingEmojis.filter(e => e !== obj);
  });
}

function handleCollect(emoji, x, y) {
  const mem = state.currentMemory;
  if (state.collected.includes(emoji)) return;
  if (!mem.emojis.includes(emoji)) {
    showOops();
    state.combo = 0;
    updateComboDisplay();
    return;
  }
  state.collected.push(emoji);
  state.combo++;
  spawnBurst(emoji, x, y);
  updateTargetHUD();
  updateComboDisplay();
  checkMemoryCompletion();
}

function spawnBurst(emoji, x, y) {
  const canvas = document.getElementById('game-canvas');
  const el = document.createElement('div');
  el.className = 'collect-burst';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  canvas.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

/* ================================================
   checkMemoryCompletion
================================================ */
function checkMemoryCompletion() {
  const mem = state.currentMemory;
  if (!mem.emojis.every(e => state.collected.includes(e))) return;

  clearInterval(state.spawnInterval);
  cancelAnimationFrame(state.gameLoopId);
  clearInterval(state.difficultyTimer);

  state.completedIds.add(mem.id);
  updateProgressText();

  setTimeout(() => showMemoryRestored(mem), 400);

  if (state.completedIds.size === memories.length) {
    setTimeout(() => {
      closeModal();
      document.getElementById('overlay-complete').classList.add('active');
    }, 2800);
  }
}

/* ================================================
   GAME LOOP (rAF)
================================================ */
function gameLoop() {
  movePlane();
  const t = performance.now() / 1000;
  state.fallingEmojis.forEach(obj => {
    obj.y += obj.speed;
    const dx = obj.wobbleAmp * Math.sin(t * 2.5 + obj.wobble) * 0.6;
    obj.el.style.left = (obj.x + dx) + 'px';
    obj.el.style.top  = obj.y + 'px';
  });
  collectEmoji();
  state.gameLoopId = requestAnimationFrame(gameLoop);
}

/* ================================================
   HUD
================================================ */
function updateTargetHUD() {
  const mem = state.currentMemory;
  const container = document.getElementById('hud-target-emojis');
  container.innerHTML = '';
  mem.emojis.forEach(emoji => {
    const slot = document.createElement('div');
    slot.className = 'target-emoji-slot' + (state.collected.includes(emoji) ? ' collected' : '');
    slot.textContent = emoji;
    container.appendChild(slot);
  });
}

function updateProgressText() {
  document.getElementById('hud-progress-text').textContent =
    `${state.completedIds.size} / ${memories.length}`;
}

function showOops() {
  const el = document.getElementById('oops');
  el.style.display = 'block';
  clearTimeout(state.oopsTimeout);
  state.oopsTimeout = setTimeout(() => { el.style.display = 'none'; }, 1000);
}

function updateComboDisplay() {
  const el = document.getElementById('combo-display');
  if (state.combo >= 2) {
    el.textContent = `COMBO ×${state.combo}`;
    el.classList.add('visible');
    clearTimeout(state.comboTimeout);
    state.comboTimeout = setTimeout(() => el.classList.remove('visible'), 1500);
  } else {
    el.classList.remove('visible');
  }
}

/* ================================================
   openPassport
================================================ */
function openPassport() {
  const grouped = groupByDate(memories);
  let html = `<div class="modal-title">✈ PASSPORT</div>`;
  html += `<div class="modal-date">COMPLETED ROUTES · ${state.completedIds.size} / ${memories.length}</div>`;
  html += `<hr style="border:none;border-top:1px solid #eee;margin:8px 0 12px;">`;

  Object.keys(grouped).sort().forEach(date => {
    html += `<div class="passport-date-group">`;
    html += `<div class="passport-date-label">📅 ${date}</div>`;
    grouped[date].forEach(mem => {
      const done = state.completedIds.has(mem.id);
      const thumb = (done && mem.image)
        ? `<img src="${mem.image}" class="pr-thumb" alt="" onerror="this.style.display='none'">`
        : '';
      if (done) {
        html += `<div class="passport-row done"
          onclick="closeModal();showMemoryRestored(memories.find(m=>m.id==='${mem.id}'))">
          <span class="pr-status">✓</span>
          <span class="pr-emojis">${mem.emojis.join('')}</span>
          <span class="pr-id">${mem.id}</span>
          ${thumb}
        </div>`;
      } else {
        html += `<div class="passport-row locked">
          <span class="pr-status">□</span>
          <span class="pr-emojis">${mem.emojis.join('')}</span>
          <span class="pr-id">${mem.id}</span>
          <span style="font-size:10px;margin-left:auto;">🔒</span>
        </div>`;
      }
    });
    html += `</div>`;
  });

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

/* ================================================
   showMemoryRestored
================================================ */
function showMemoryRestored(mem) {
  const imageBlock = mem.image
    ? `<img src="${mem.image}" class="modal-image" alt="${mem.id}"
        onerror="this.style.display='none'">`
    : `<div class="modal-image-placeholder">[ IMAGE COMING SOON ]</div>`;

  const html = `
    <div class="modal-title">✈ BOOKING CONFIRMED!</div>
    <div class="modal-date">${mem.date} · ${mem.id}</div>
    <div class="modal-emojis">${mem.emojis.join(' ')}</div>
    ${imageBlock}
    <div class="modal-btn-row">
      <button class="btn btn-dark btn-sm"
        onclick="window.open('${mem.link}','_blank')">[ FLY! ]</button>
      <button class="btn btn-sm"
        onclick="closeModal();showDateSelect()">[ CHOOSE ANOTHER ]</button>
    </div>
  `;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

/* ================================================
   restartGame
================================================ */
function restartGame() {
  document.getElementById('overlay-complete').classList.remove('active');
  state.completedIds = new Set();
  closeModal();
  showScreen('screen-start');
}
</script>
